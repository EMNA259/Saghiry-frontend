<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGHIRY - Emploi du temps de mes enfants</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-green: #4ca896;
            --primary-dark: #3d8a7f;
            --primary-deep: #2d6b63;
            --accent-orange: #ff9466;
            --accent-orange-dark: #ff7b3d;
            --gray-bg: #f8fafc;
            --gray-border: #e0e9e7;
            --text-dark: #1e3b36;
            --text-soft: #3d5a54;
            --text-light: #5a9d91;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        body {
            background: #f0f5f8;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .enfants-container {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-border);
        }

        .enfants-tabs {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .enfant-tab {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1.5rem;
            background: var(--gray-bg);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .enfant-tab:hover {
            background: #e0f2f1;
            transform: translateY(-2px);
        }

        .enfant-tab.active {
            background: linear-gradient(135deg, var(--primary-green), var(--primary-dark));
            color: white;
            border-color: var(--primary-green);
            box-shadow: 0 4px 15px rgba(76, 168, 150, 0.3);
        }

        .enfant-tab.active .enfant-tab-name {
            color: white;
        }

        .enfant-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary-green), var(--primary-deep));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .enfant-tab-info {
            text-align: left;
        }

        .enfant-tab-name {
            font-weight: 700;
            color: var(--text-dark);
        }

        .enfant-tab-class {
            font-size: 0.7rem;
            background: rgba(76, 168, 150, 0.2);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            display: inline-block;
            margin-top: 0.2rem;
        }

        .enfant-tab.active .enfant-tab-class {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .page-header {
            background: white;
            border-radius: 20px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title h1 {
            color: var(--text-dark);
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .page-title p {
            color: var(--text-light);
            margin-top: 0.3rem;
            font-size: 0.9rem;
        }

        .annee-badge {
            background: #e0f2f1;
            color: var(--primary-deep);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-green), var(--primary-dark));
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(76, 168, 150, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(76, 168, 150, 0.4);
        }

        .btn-secondary {
            background: white;
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-secondary:hover {
            background: var(--primary-green);
            color: white;
            transform: translateY(-2px);
        }

        .btn-export-pdf {
            background: #dc2626;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .btn-export-pdf:hover {
            background: #b91c1c;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        .info-bar {
            background: white;
            border-radius: 20px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid var(--gray-border);
            box-shadow: var(--shadow-sm);
        }

        .total-heures {
            background: linear-gradient(135deg, var(--primary-green), var(--primary-deep));
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
        }

        .total-heures span {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .jour-legend {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            background: white;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            border: 1px solid var(--gray-border);
            justify-content: center;
        }

        .jour-legend-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            color: var(--text-dark);
        }

        .jour-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .jour-color.lundi { background: var(--accent-orange); }
        .jour-color.mardi { background: var(--primary-green); }
        .jour-color.mercredi { background: #8b5cf6; }
        .jour-color.jeudi { background: #3b82f6; }
        .jour-color.vendredi { background: #f59e0b; }
        .jour-color.samedi { background: #ef4444; }

        .emploi-grid {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--gray-border);
            box-shadow: var(--shadow-lg);
            overflow-x: auto;
        }

        .grid-table {
            display: grid;
            gap: 0;
            min-width: 900px;
            border: 1px solid var(--gray-border);
            border-radius: 16px;
            overflow: hidden;
        }

        .grid-header {
            font-weight: 700;
            color: white;
            padding: 1rem 0.5rem;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-green), var(--primary-deep));
            border-right: 1px solid rgba(255,255,255,0.1);
            font-size: 1rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .grid-header:last-child {
            border-right: none;
        }

        .time-slot {
            padding: 0.8rem 0.5rem;
            text-align: center;
            font-weight: 700;
            color: var(--accent-orange);
            background: linear-gradient(135deg, #fef9e6, #fff4e6);
            border-right: 1px solid var(--gray-border);
            border-bottom: 1px solid var(--gray-border);
            font-size: 0.85rem;
            font-family: monospace;
        }

        .cours-cell {
            padding: 0.6rem;
            background: #fff7ed;
            border-right: 1px solid var(--gray-border);
            border-bottom: 1px solid var(--gray-border);
            border-left: 4px solid var(--accent-orange);
            transition: all 0.2s;
            cursor: pointer;
        }

        .cours-cell:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-md);
            background: #ffedd5;
            z-index: 5;
            position: relative;
        }

        .cours-matiere {
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
        }

        .cours-enseignant {
            font-size: 0.7rem;
            color: var(--primary-deep);
            font-weight: 500;
            margin-bottom: 0.2rem;
        }

        .cours-salle {
            font-size: 0.65rem;
            color: var(--text-light);
            background: rgba(76, 168, 150, 0.1);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            display: inline-block;
        }

        .cours-duree {
            font-size: 0.6rem;
            color: var(--text-light);
            margin-top: 0.2rem;
        }

        .empty-cell {
            color: var(--text-light);
            font-size: 0.8rem;
            text-align: center;
            padding: 0.8rem 0.3rem;
            background: #fefefe;
            border-right: 1px solid var(--gray-border);
            border-bottom: 1px solid var(--gray-border);
        }

        .legende-cours {
            display: flex;
            gap: 1.5rem;
            margin-top: 1.5rem;
            padding: 0.8rem 1.5rem;
            background: white;
            border-radius: 20px;
            font-size: 0.8rem;
            flex-wrap: wrap;
            border: 1px solid var(--gray-border);
        }

        .legende-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-dark);
        }

        .legende-couleur {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            background: #fff7ed;
            border-left: 3px solid var(--accent-orange);
        }

        .loading, .error-message, .no-data {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 24px;
            font-size: 1rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-border);
        }

        .loading {
            color: var(--text-light);
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--gray-border);
            border-top-color: var(--primary-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            color: #b91c1c;
            background: #fee2e2;
        }

        .no-data {
            color: var(--text-light);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            transform: translateY(30px);
            transition: all 0.3s ease;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--gray-border);
        }

        .modal-title {
            color: var(--text-dark);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-light);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: #fee2e2;
            color: #dc2626;
            transform: rotate(90deg);
        }

        /* Cacher l'affichage de la classe si on veut */
        .hide-class {
            display: none;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .enfant-tab { padding: 0.5rem 1rem; }
            .enfant-avatar { width: 35px; height: 35px; font-size: 0.9rem; }
            .page-title h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div id="mainContainer">
        <div class="loading">Chargement de l'emploi du temps...</div>
    </div>

    <div class="modal" id="coursModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="coursModalTitle">📖 Détails du cours</h2>
                <button class="modal-close" onclick="closeCoursModal()">&times;</button>
            </div>
            <div id="coursModalContent"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        const API_BASE = 'http://localhost:5267/api';
        let token = null;
        let enfants = [];
        let currentEnfantId = null;
        let emploisData = {};

        const jours = ['lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'];
        const joursFr = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];

        // Configuration : mettre à false pour cacher complètement la classe
        const AFFICHER_CLASSE = true;  // Mettre à false pour supprimer l'affichage de la classe
        const UTILISER_NIVEAU = true;   // Mettre à true pour utiliser le niveau au lieu de "Ma classe"

        // Fonction pour vérifier si une chaîne est un ID MongoDB
        function isMongoId(str) {
            return typeof str === 'string' && /^[a-f0-9]{24}$/i.test(str);
        }

        // Fonction pour formater le nom de la classe
        function formatClassName(enfant) {
            if (!AFFICHER_CLASSE) {
                return ''; // Ne rien afficher
            }
            
            // Essayer d'utiliser le niveau d'abord
            if (UTILISER_NIVEAU && enfant.niveau) {
                return enfant.niveau;
            }
            
            // Sinon essayer classeNom
            if (enfant.classeNom && !isMongoId(enfant.classeNom)) {
                return enfant.classeNom;
            }
            
            // Sinon essayer classeId si ce n'est pas un ID
            if (enfant.classeId && !isMongoId(enfant.classeId)) {
                return enfant.classeId;
            }
            
            // Si on a un niveau dans l'objet original
            if (enfant.niveau) {
                return enfant.niveau;
            }
            
            // Dernier recours : ne rien afficher
            return '';
        }

        // Fonction pour nettoyer le nom des enfants
        function cleanName(prenom, nom) {
            let cleanPrenom = prenom || '';
            let cleanNom = nom || '';
            
            if (typeof cleanPrenom === 'object') {
                cleanPrenom = cleanPrenom.nom || cleanPrenom.prenom || cleanPrenom.value || '';
            }
            if (typeof cleanNom === 'object') {
                cleanNom = cleanNom.nom || cleanNom.prenom || cleanNom.value || '';
            }
            
            cleanPrenom = String(cleanPrenom).trim();
            cleanNom = String(cleanNom).trim();
            
            if (isMongoId(cleanPrenom)) cleanPrenom = '';
            if (isMongoId(cleanNom)) cleanNom = '';
            
            let fullName = `${cleanPrenom} ${cleanNom}`.trim();
            
            if (!fullName || fullName.length === 0) {
                return "Mon enfant";
            }
            
            fullName = fullName.split(' ').map(word => {
                if (word.length === 0) return '';
                return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
            }).join(' ');
            
            return fullName;
        }

        function getAuthToken() {
            try {
                if (window.parent && window.parent.ParentSpace && typeof window.parent.ParentSpace.getToken === 'function') {
                    return window.parent.ParentSpace.getToken();
                }
                if (window.ParentSpace && typeof window.ParentSpace.getToken === 'function') {
                    return window.ParentSpace.getToken();
                }
            } catch(e) { console.warn('Cannot access ParentSpace:', e); }
            return localStorage.getItem('authToken') || localStorage.getItem('parentAuthToken') || sessionStorage.getItem('authToken');
        }

        function requestTokenFromParent() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'REQUEST_TOKEN' }, '*');
            }
        }

        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'SET_TOKEN') {
                token = event.data.token;
                console.log('✅ Token reçu du parent');
                chargerEnfants();
            }
        });

        function extraireHeure(value) {
            if (!value) return null;
            if (typeof value === 'string' && value.match(/^\d{2}:\d{2}$/)) return value;
            if (typeof value === 'string') {
                const match = value.match(/^(\d{2}):(\d{2})/);
                if (match) return `${match[1]}:${match[2]}`;
            }
            try {
                let dateObj = value;
                if (value.$date) dateObj = value.$date;
                const date = new Date(dateObj);
                if (!isNaN(date.getTime())) {
                    return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                }
            } catch(e) {}
            return null;
        }

        function heureEnMinutes(heureStr) {
            if (!heureStr) return 0;
            const match = heureStr.match(/^(\d{1,2}):(\d{2})$/);
            if (!match) return 0;
            return parseInt(match[1], 10) * 60 + parseInt(match[2], 10);
        }

        function normaliserEmploi(emploi) {
            if (!emploi) return null;
            
            const normalise = {
                id: emploi.Id || emploi.id || emploi._id,
                classeId: emploi.ClasseId || emploi.classeId,
                anneeScolaire: emploi.AnneeScolaire || emploi.anneeScolaire || '2025-2026',
                emploiParJour: { lundi: [], mardi: [], mercredi: [], jeudi: [], vendredi: [], samedi: [] },
                totalHeures: 0
            };
            
            let creneaux = [];
            if (emploi.Data && emploi.Data.Creneaux) creneaux = emploi.Data.Creneaux;
            else if (emploi.Creneaux) creneaux = emploi.Creneaux;
            else if (emploi.creneaux) creneaux = emploi.creneaux;
            
            let totalHeures = 0;
            
            creneaux.forEach(c => {
                if (!c) return;
                const heureDebut = extraireHeure(c.HeureDebut || c.heureDebut);
                const heureFin = extraireHeure(c.HeureFin || c.heureFin);
                if (!heureDebut || !heureFin) return;
                
                const debutMinutes = heureEnMinutes(heureDebut);
                const finMinutes = heureEnMinutes(heureFin);
                const dureeHeures = (finMinutes - debutMinutes) / 60;
                
                let jour = (c.Jour || c.jour || '').toLowerCase();
                const jourMap = {
                    'lundi': 'lundi', 'mardi': 'mardi', 'mercredi': 'mercredi',
                    'jeudi': 'jeudi', 'vendredi': 'vendredi', 'samedi': 'samedi'
                };
                jour = jourMap[jour] || jour;
                
                if (normalise.emploiParJour[jour]) {
                    const cours = {
                        id: c.Id || c.id || `${jour}_${heureDebut}`,
                        jour: jour,
                        heureDebut: heureDebut,
                        heureFin: heureFin,
                        debutMinutes: debutMinutes,
                        finMinutes: finMinutes,
                        dureeHeures: dureeHeures,
                        matiereId: c.MatiereId || c.matiereId,
                        matiereNom: (c.MatiereNom || c.matiereNom || c.Matiere || c.matiere || 'Cours'),
                        enseignantId: c.EnseignantId || c.enseignantId,
                        enseignantNom: (c.EnseignantNom || c.enseignantNom || c.Enseignant || c.enseignant || 'Enseignant'),
                        salle: (c.Salle || c.salle || 'Salle'),
                        typeCours: c.TypeCours || c.typeCours || 'cours'
                    };
                    normalise.emploiParJour[jour].push(cours);
                    totalHeures += dureeHeures;
                }
            });
            
            Object.keys(normalise.emploiParJour).forEach(jour => {
                normalise.emploiParJour[jour].sort((a, b) => a.debutMinutes - b.debutMinutes);
            });
            
            normalise.totalHeures = Math.round(totalHeures * 10) / 10;
            return normalise;
        }

        async function chargerEnfants() {
            if (!token) {
                token = getAuthToken();
                if (!token) {
                    requestTokenFromParent();
                    setTimeout(() => { if (!token) chargerEnfants(); }, 500);
                    return;
                }
            }

            try {
                const response = await fetch(`${API_BASE}/utilisateurs/parent/enfants`, {
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        requestTokenFromParent();
                        setTimeout(() => chargerEnfants(), 1000);
                        return;
                    }
                    throw new Error(`Erreur ${response.status}`);
                }

                const data = await response.json();
                enfants = data.data || [];
                
                console.log('📊 Données des enfants:', enfants);
                console.log(`📊 ${enfants.length} enfant(s) trouvé(s)`);

                if (enfants.length === 0) {
                    afficherAucunEnfant();
                    return;
                }

                await chargerEmploisTousEnfants();
                
                if (enfants.length > 0 && !currentEnfantId) {
                    currentEnfantId = enfants[0].id || enfants[0]._id;
                }
                
                afficherInterface();

            } catch (error) {
                console.error('Erreur chargement enfants:', error);
                afficherErreur('Impossible de charger la liste de vos enfants.');
            }
        }

        async function chargerEmploisTousEnfants() {
            for (const enfant of enfants) {
                const enfantId = enfant.id || enfant._id;
                await chargerEmploiEnfant(enfantId, enfant.classeId);
            }
        }

        async function chargerEmploiEnfant(eleveId, classeId) {
            if (!classeId) {
                emploisData[eleveId] = null;
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/EmploiDuTemps/classe/${classeId}`, {
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        emploisData[eleveId] = null;
                        return;
                    }
                    throw new Error(`Erreur ${response.status}`);
                }

                const result = await response.json();
                let emploi = null;
                if (result.Data) emploi = result.Data;
                else if (result.data) emploi = result.data;
                else emploi = result;

                emploisData[eleveId] = normaliserEmploi(emploi);

            } catch (error) {
                console.error(`Erreur chargement emploi pour ${eleveId}:`, error);
                emploisData[eleveId] = null;
            }
        }

        function genererTranchesHoraires() {
            const tranches = [];
            for (let h = 8; h <= 18; h++) {
                tranches.push(`${h.toString().padStart(2, '0')}:00`);
            }
            return tranches;
        }

        function calculerSpan(cours, tranchesHoraires) {
            let span = 0;
            for (const tranche of tranchesHoraires) {
                const trancheMinutes = heureEnMinutes(tranche);
                if (trancheMinutes >= cours.debutMinutes && trancheMinutes < cours.finMinutes) {
                    span++;
                }
            }
            return Math.max(1, span);
        }

        function afficherEmploi(emploi) {
            if (!emploi || !emploi.emploiParJour) {
                return `<div class="no-data">
                            <div style="font-size: 3rem; margin-bottom: 1rem;">📅</div>
                            <h3>Aucun emploi du temps</h3>
                            <p style="color: var(--text-light); margin-top: 0.5rem;">L'emploi du temps n'est pas encore disponible pour cette classe.</p>
                        </div>`;
            }

            const emploiParJour = emploi.emploiParJour;
            const tranchesHoraires = genererTranchesHoraires();
            const totalCours = Object.values(emploiParJour).flat().length;
            
            if (totalCours === 0) {
                return `<div class="no-data">
                            <div style="font-size: 3rem; margin-bottom: 1rem;">📭</div>
                            <h3>Aucun cours programmé</h3>
                            <p style="color: var(--text-light); margin-top: 0.5rem;">Aucun cours n'a été programmé pour cette classe.</p>
                        </div>`;
            }
            
            let html = `<div class="grid-table" style="grid-template-columns: 100px repeat(6, 1fr);">`;
            html += '<div class="grid-header">Horaire</div>';
            joursFr.forEach(j => html += `<div class="grid-header">${j}</div>`);
            
            const cellCovered = Array(tranchesHoraires.length).fill().map(() => Array(6).fill(false));
            
            for (let i = 0; i < tranchesHoraires.length; i++) {
                const heure = tranchesHoraires[i];
                html += `<div class="time-slot">${heure}</div>`;
                
                for (let j = 0; j < jours.length; j++) {
                    const jour = jours[j];
                    const creneaux = emploiParJour[jour] || [];
                    
                    if (cellCovered[i][j]) continue;
                    
                    const cours = creneaux.find(c => c.heureDebut === heure);
                    
                    if (cours) {
                        const span = calculerSpan(cours, tranchesHoraires);
                        const coursData = JSON.stringify(cours).replace(/"/g, '&quot;');
                        
                        for (let k = i; k < i + span && k < tranchesHoraires.length; k++) {
                            cellCovered[k][j] = true;
                        }
                        
                        html += `<div class="cours-cell" style="grid-row: span ${span};" onclick="afficherDetailCours(${coursData})">
                                    <div class="cours-matiere">📖 ${escapeHtml(cours.matiereNom)}</div>
                                    <div class="cours-enseignant">👨‍🏫 ${escapeHtml(cours.enseignantNom)}</div>
                                    <div class="cours-salle">📍 ${escapeHtml(cours.salle)}</div>
                                    <div class="cours-duree">⏱️ ${cours.dureeHeures.toFixed(1)}h (${cours.heureDebut} - ${cours.heureFin})</div>
                                </div>`;
                    } else {
                        html += `<div class="empty-cell">—</div>`;
                    }
                }
            }
            
            html += '</div>';
            html += `<div style="margin-top: 1rem; padding: 0.8rem; background: var(--gray-bg); border-radius: 12px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem;">
                        <span>📊 Total heures: <strong>${emploi.totalHeures}h</strong></span>
                        <span>📚 ${totalCours} cours</span>
                    </div>`;
            
            return html;
        }

        function afficherDetailCours(cours) {
            const modal = document.getElementById('coursModal');
            const content = document.getElementById('coursModalContent');
            const jourIndex = jours.indexOf(cours.jour);
            const jourFr = jourIndex >= 0 ? joursFr[jourIndex] : cours.jour;
            
            content.innerHTML = `
                <div style="margin-bottom: 1rem;">
                    <div style="background: linear-gradient(135deg, var(--primary-green), var(--primary-dark)); padding: 1rem; border-radius: 16px; color: white; margin-bottom: 1rem;">
                        <h3 style="margin-bottom: 0.5rem;">${escapeHtml(cours.matiereNom)}</h3>
                        <p>${escapeHtml(cours.enseignantNom)}</p>
                    </div>
                    <div style="display: grid; gap: 0.8rem;">
                        <div style="display: flex; align-items: center; gap: 0.8rem; padding: 0.5rem; background: var(--gray-bg); border-radius: 12px;">
                            <span>📅</span>
                            <span><strong>Jour:</strong> ${jourFr}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.8rem; padding: 0.5rem; background: var(--gray-bg); border-radius: 12px;">
                            <span>⏰</span>
                            <span><strong>Horaire:</strong> ${cours.heureDebut} - ${cours.heureFin}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.8rem; padding: 0.5rem; background: var(--gray-bg); border-radius: 12px;">
                            <span>⏱️</span>
                            <span><strong>Durée:</strong> ${cours.dureeHeures.toFixed(1)} heure(s)</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.8rem; padding: 0.5rem; background: var(--gray-bg); border-radius: 12px;">
                            <span>📍</span>
                            <span><strong>Salle:</strong> ${escapeHtml(cours.salle)}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.8rem; padding: 0.5rem; background: var(--gray-bg); border-radius: 12px;">
                            <span>👨‍🏫</span>
                            <span><strong>Enseignant:</strong> ${escapeHtml(cours.enseignantNom)}</span>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.add('active');
        }

        function closeCoursModal() {
            document.getElementById('coursModal').classList.remove('active');
        }

        async function exporterEmploiPDF() {
            const enfant = enfants.find(e => (e.id || e._id) === currentEnfantId);
            const clean = enfant ? cleanName(enfant.prenom, enfant.nom) : "Enfant";
            const classeName = enfant ? formatClassName(enfant) : "";
            
            const element = document.getElementById('emploiContent');
            if (!element) return;
            
            const originalContent = element.innerHTML;
            
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = originalContent;
            
            tempDiv.querySelectorAll('.cours-cell').forEach(cell => {
                cell.style.cursor = 'default';
            });
            
            const title = document.createElement('div');
            title.style.textAlign = 'center';
            title.style.marginBottom = '20px';
            title.style.padding = '20px';
            title.style.background = 'linear-gradient(135deg, #4ca896, #2d6b63)';
            title.style.color = 'white';
            title.style.borderRadius = '15px';
            title.innerHTML = `
                <h1 style="margin: 0;">📅 Emploi du temps</h1>
                <h2 style="margin: 10px 0 0 0;">${escapeHtml(clean)}</h2>
                ${classeName ? `<p style="margin: 5px 0 0 0;">${escapeHtml(classeName)}</p>` : ''}
                <p style="margin: 5px 0 0 0; font-size: 12px;">Année scolaire 2025-2026</p>
                <p style="margin: 5px 0 0 0; font-size: 12px;">Généré le ${new Date().toLocaleDateString('fr-FR')} à ${new Date().toLocaleTimeString('fr-FR')}</p>
            `;
            
            const legende = document.createElement('div');
            legende.style.margin = '20px 0';
            legende.style.padding = '10px';
            legende.style.background = '#f8fafc';
            legende.style.borderRadius = '10px';
            legende.style.border = '1px solid #e0e9e7';
            legende.style.display = 'flex';
            legende.style.gap = '20px';
            legende.style.flexWrap = 'wrap';
            legende.style.justifyContent = 'center';
            legende.innerHTML = `
                <div style="display: flex; align-items: center; gap: 5px;"><span style="width: 12px; height: 12px; background: #ff9466; border-radius: 3px;"></span> Lundi</div>
                <div style="display: flex; align-items: center; gap: 5px;"><span style="width: 12px; height: 12px; background: #4ca896; border-radius: 3px;"></span> Mardi</div>
                <div style="display: flex; align-items: center; gap: 5px;"><span style="width: 12px; height: 12px; background: #8b5cf6; border-radius: 3px;"></span> Mercredi</div>
                <div style="display: flex; align-items: center; gap: 5px;"><span style="width: 12px; height: 12px; background: #3b82f6; border-radius: 3px;"></span> Jeudi</div>
                <div style="display: flex; align-items: center; gap: 5px;"><span style="width: 12px; height: 12px; background: #f59e0b; border-radius: 3px;"></span> Vendredi</div>
                <div style="display: flex; align-items: center; gap: 5px;"><span style="width: 12px; height: 12px; background: #ef4444; border-radius: 3px;"></span> Samedi</div>
            `;
            
            const wrapper = document.createElement('div');
            wrapper.style.padding = '20px';
            wrapper.style.fontFamily = 'Segoe UI, Tahoma, Geneva, Verdana, sans-serif';
            wrapper.appendChild(title);
            wrapper.appendChild(legende);
            wrapper.appendChild(tempDiv);
            
            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `Emploi_${clean.replace(/\s/g, '_')}_${new Date().toISOString().slice(0,10)}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, letterRendering: true, useCORS: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
            };
            
            html2pdf().set(opt).from(wrapper).save();
        }

        function afficherInterface() {
            const container = document.getElementById('mainContainer');
            const enfant = enfants.find(e => (e.id || e._id) === currentEnfantId);
            const emploi = emploisData[currentEnfantId];
            
            // Générer l'affichage des onglets enfants
            let tabsHtml = '';
            for (const e of enfants) {
                const enfantId = e.id || e._id;
                const clean = cleanName(e.prenom, e.nom);
                const initial = clean.charAt(0) || 'E';
                const classeDisplay = formatClassName(e);
                
                // Ne pas afficher la classe si elle est vide
                const classHtml = classeDisplay ? `<div class="enfant-tab-class">${escapeHtml(classeDisplay)}</div>` : '';
                
                tabsHtml += `
                    <div class="enfant-tab ${enfantId === currentEnfantId ? 'active' : ''}" 
                         onclick="selectEnfant('${enfantId}')">
                        <div class="enfant-avatar">
                            ${escapeHtml(initial)}
                        </div>
                        <div class="enfant-tab-info">
                            <div class="enfant-tab-name">${escapeHtml(clean)}</div>
                            ${classHtml}
                        </div>
                    </div>
                `;
            }
            
            container.innerHTML = `
                <div class="enfants-container">
                    <div class="enfants-tabs" id="enfantsTabs">
                        ${tabsHtml}
                        <button class="enfant-tab" onclick="rafraichirEmploi()" style="background: transparent; border: 1px solid var(--primary-green);">
                            <span>🔄</span>
                            <span>Rafraîchir</span>
                        </button>
                    </div>
                </div>

                <div class="page-header">
                    <div class="page-title">
                        <h1>
                            <span>📅</span>
                            Emploi du temps
                            <span class="annee-badge">2025-2026</span>
                        </h1>
                        <p>${enfant ? `Emploi du temps de ${escapeHtml(cleanName(enfant.prenom, enfant.nom))}` : 'Chargement...'}</p>
                    </div>
                    <div class="header-actions">
                        <button class="btn-secondary" onclick="rafraichirEmploi()">
                            <span>🔄</span> Actualiser
                        </button>
                        <button class="btn-export-pdf" onclick="exporterEmploiPDF()">
                            <span>📥</span> Exporter PDF
                        </button>
                    </div>
                </div>

                ${emploi ? `
                    <div class="info-bar">
                        <div class="total-heures">
                            <span>${emploi.totalHeures || 0}</span> heures au total
                        </div>
                        <div style="display: flex; gap: 0.5rem;">
                            <span>📚 ${Object.values(emploi.emploiParJour).flat().length} cours</span>
                        </div>
                    </div>
                ` : ''}

                <div class="jour-legend">
                    <div class="jour-legend-item"><span class="jour-color lundi"></span> Lundi</div>
                    <div class="jour-legend-item"><span class="jour-color mardi"></span> Mardi</div>
                    <div class="jour-legend-item"><span class="jour-color mercredi"></span> Mercredi</div>
                    <div class="jour-legend-item"><span class="jour-color jeudi"></span> Jeudi</div>
                    <div class="jour-legend-item"><span class="jour-color vendredi"></span> Vendredi</div>
                    <div class="jour-legend-item"><span class="jour-color samedi"></span> Samedi</div>
                </div>

                <div id="emploiContent">
                    <div class="emploi-grid">
                        ${afficherEmploi(emploi)}
                    </div>
                </div>

                <div class="legende-cours">
                    <div class="legende-item">
                        <div class="legende-couleur"></div>
                        <span>Cours programmé</span>
                    </div>
                    <div class="legende-item">
                        <span>⏱️ Durée réelle des cours</span>
                    </div>
                    <div class="legende-item">
                        <span>📌 Cliquez sur un cours pour plus de détails</span>
                    </div>
                </div>
            `;
        }

        async function rafraichirEmploi() {
            if (currentEnfantId) {
                const enfant = enfants.find(e => (e.id || e._id) === currentEnfantId);
                if (enfant && enfant.classeId) {
                    await chargerEmploiEnfant(currentEnfantId, enfant.classeId);
                    afficherInterface();
                }
            }
        }

        function selectEnfant(eleveId) {
            currentEnfantId = eleveId;
            afficherInterface();
        }

        function afficherErreur(message) {
            const container = document.getElementById('mainContainer');
            container.innerHTML = `
                <div class="error-message">
                    ❌ ${escapeHtml(message)}
                </div>
                <button class="btn-secondary" onclick="location.reload()" style="margin-top: 1rem;">🔄 Réessayer</button>
            `;
        }

        function afficherAucunEnfant() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = `
                <div class="no-data">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">👧🧒</div>
                    <h3>Aucun enfant associé</h3>
                    <p style="color: var(--text-light); margin-top: 0.5rem;">Aucun enfant n'est associé à votre compte parent.</p>
                </div>
            `;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        document.addEventListener('DOMContentLoaded', function() {
            token = getAuthToken();
            if (token) {
                chargerEnfants();
            } else {
                requestTokenFromParent();
                setTimeout(() => {
                    token = getAuthToken();
                    if (token) chargerEnfants();
                    else afficherErreur('Impossible de récupérer votre session. Veuillez vous reconnecter.');
                }, 1000);
            }
        });

        window.selectEnfant = selectEnfant;
        window.rafraichirEmploi = rafraichirEmploi;
        window.exporterEmploiPDF = exporterEmploiPDF;
        window.closeCoursModal = closeCoursModal;
        window.afficherDetailCours = afficherDetailCours;
    </script>
</body>
</html>

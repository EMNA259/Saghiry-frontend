<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGHIRY - Gestion des Donations</title>
    <script src="global-settings.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-green: #4ca896;
            --primary-dark: #3d8a7f;
            --primary-deep: #2d6b63;
            --accent-orange: #ff9466;
            --accent-orange-dark: #ff7b3d;
            --accent-purple: #9775fa;
            --gray-bg: #f8fafc;
            --gray-border: #e0e9e7;
            --text-dark: #1e3b36;
            --text-soft: #3d5a54;
            --text-light: #5a9d91;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2f1 100%);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* Thème sombre */
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        body.dark-mode .stat-card,
        body.dark-mode .donation-card,
        body.dark-mode .modal,
        body.dark-mode .loading,
        body.dark-mode .empty-state {
            background: #16213e;
            border-color: #2d2d44;
        }

        body.dark-mode .donations-header h1 {
            color: #6abfad;
        }

        body.dark-mode .donations-header p {
            color: #8a9ba8;
        }

        body.dark-mode .stat-value {
            color: #6abfad;
        }

        body.dark-mode .stat-label,
        body.dark-mode .stat-sub {
            color: #8a9ba8;
        }

        body.dark-mode .donation-amount {
            color: #6abfad;
        }

        body.dark-mode .donor-name {
            color: #e0e0e0;
        }

        body.dark-mode .donor-role,
        body.dark-mode .donation-date {
            color: #8a9ba8;
        }

        body.dark-mode .donation-message {
            background: #1a1a2e;
            color: #b0b0b0;
        }

        body.dark-mode .form-input,
        body.dark-mode .form-select,
        body.dark-mode .form-textarea {
            background: #0a0a1a;
            border-color: #2d2d44;
            color: #e0e0e0;
        }

        body.dark-mode .form-input:focus,
        body.dark-mode .form-select:focus,
        body.dark-mode .form-textarea:focus {
            border-color: #6abfad;
            box-shadow: 0 0 0 3px rgba(106, 191, 173, 0.1);
        }

        body.dark-mode .form-label {
            color: #b0b0b0;
        }

        body.dark-mode .modal-header {
            border-bottom-color: #2d2d44;
        }

        body.dark-mode .modal-header h3 {
            color: #6abfad;
        }

        body.dark-mode .modal-footer {
            border-top-color: #2d2d44;
        }

        body.dark-mode .tabs {
            border-bottom-color: #2d2d44;
        }

        body.dark-mode .tab {
            color: #8a9ba8;
        }

        body.dark-mode .tab.active {
            color: #6abfad;
            background: rgba(106, 191, 173, 0.1);
            border-bottom-color: #6abfad;
        }

        body.dark-mode .tab:hover:not(.active) {
            color: #6abfad;
            background: rgba(106, 191, 173, 0.05);
        }

        body.dark-mode .btn-secondary {
            background: #16213e;
            border-color: #2d2d44;
            color: #b0b0b0;
        }

        body.dark-mode .btn-secondary:hover {
            border-color: #6abfad;
            color: #6abfad;
        }

        body.dark-mode .type-materiel { background: #1a3a3a; color: #6abfad; }
        body.dark-mode .type-frais { background: #3a2a1a; color: #ff9466; }
        body.dark-mode .type-libre { background: #2a1a3a; color: #b794f4; }

        body.dark-mode .anonymous-badge {
            background: #2d2d44;
            color: #8a9ba8;
        }

        body.dark-mode .toast {
            background: #16213e;
            color: #e0e0e0;
        }

        .donations-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .donations-header {
            margin-bottom: 2rem;
        }

        .donations-header h1 {
            font-size: 2rem;
            color: var(--primary-deep);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .donations-header h1 span {
            background: linear-gradient(135deg, var(--accent-orange) 0%, var(--accent-orange-dark) 100%);
            width: 45px;
            height: 45px;
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .donations-header p {
            color: var(--text-light);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            border: 1px solid var(--gray-border);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-green), var(--accent-orange));
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-deep);
            margin-bottom: 0.25rem;
        }

        .stat-label {
            color: var(--text-light);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .stat-sub {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.5rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.95rem;
            box-shadow: 0 4px 12px rgba(76, 168, 150, 0.25);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(76, 168, 150, 0.35);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            border: 2px solid var(--gray-border);
            color: var(--text-soft);
            padding: 0.8rem 1.8rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
        }

        .btn-secondary:hover {
            border-color: var(--primary-green);
            color: var(--primary-green);
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--gray-border);
            padding-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: none;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 10px 10px 0 0;
        }

        .tab.active {
            color: var(--primary-green);
            background: rgba(76, 168, 150, 0.1);
            border-bottom: 3px solid var(--primary-green);
        }

        .tab:hover:not(.active) {
            color: var(--primary-deep);
            background: rgba(76, 168, 150, 0.05);
        }

        .donations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .donation-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            border: 1px solid var(--gray-border);
        }

        .donation-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .donation-amount {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-deep);
            margin-bottom: 0.5rem;
        }

        .donation-amount small {
            font-size: 0.9rem;
            font-weight: normal;
            color: var(--text-light);
        }

        .donation-type {
            display: inline-block;
            padding: 0.25rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .type-materiel { background: #e6f7f4; color: #4ca896; }
        .type-frais { background: #fff5e6; color: #ff9466; }
        .type-libre { background: #e6e6ff; color: #9775fa; }

        .donation-donor {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 1rem 0;
            padding: 0.8rem 0;
            border-top: 1px solid var(--gray-border);
            border-bottom: 1px solid var(--gray-border);
        }

        .donor-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-orange) 0%, var(--accent-orange-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .donor-info {
            flex: 1;
        }

        .donor-name {
            font-weight: 700;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .donor-role {
            font-size: 0.7rem;
            color: var(--text-light);
        }

        .donation-date {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 0.5rem;
        }

        .donation-message {
            margin-top: 0.8rem;
            padding: 0.8rem;
            background: #f8faf9;
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--text-soft);
            font-style: italic;
        }

        .anonymous-badge {
            background: #e2e8f0;
            color: #64748b;
            padding: 0.2rem 0.5rem;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal {
            background: white;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--gray-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: var(--primary-deep);
            font-size: 1.3rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #ff6b6b;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--gray-border);
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: var(--text-soft);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid var(--gray-border);
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(76, 168, 150, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .loading, .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            background: white;
            border-radius: 20px;
            border: 1px solid var(--gray-border);
            grid-column: 1/-1;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--gray-border);
            border-top-color: var(--primary-green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            background: white;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            z-index: 1100;
            animation: slideInRight 0.3s ease;
            border-left: 4px solid;
        }

        .toast-success { border-left-color: var(--primary-green); }
        .toast-error { border-left-color: #ff6b6b; }
        .toast-info { border-left-color: var(--accent-orange); }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .donations-container {
                padding: 1rem;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .donations-grid {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                flex-direction: column;
            }
            .btn-primary, .btn-secondary {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="donations-container">
        <div class="donations-header">
            <h1>
                <span>🤝</span>
                Gestion des Donations
            </h1>
            <p>Gérez les dons pour soutenir notre école et nos projets éducatifs</p>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="totalAmount">0</div>
                <div class="stat-label">Total des dons</div>
                <div class="stat-sub">Montant collecté</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="totalDonors">0</div>
                <div class="stat-label">Donateurs uniques</div>
                <div class="stat-sub">Personnes ayant contribué</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-value" id="totalDonations">0</div>
                <div class="stat-label">Nombre de dons</div>
                <div class="stat-sub">Total des contributions</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-value" id="avgAmount">0</div>
                <div class="stat-label">Montant moyen</div>
                <div class="stat-sub">Par donation</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-primary" id="makeDonationBtn">
                <span>🎁</span> Faire un don
            </button>
            <button class="btn-secondary" id="refreshBtn">
                <span>🔄</span> Actualiser
            </button>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="all">📋 Tous les dons</button>
            <button class="tab" data-tab="materiel">📚 Matériel</button>
            <button class="tab" data-tab="frais">🎓 Frais scolaires</button>
            <button class="tab" data-tab="libre">💝 Libre</button>
        </div>

        <div id="donationsList" class="donations-grid"></div>
    </div>

    <!-- Modal -->
    <div id="donationModal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3>🎁 Faire un don</h3>
                <button class="modal-close" onclick="closeDonationModal()">✕</button>
            </div>
            <div class="modal-body">
                <form id="donationForm">
                    <div class="form-group">
                        <label class="form-label">Type de donation *</label>
                        <select id="donationType" class="form-select" required>
                            <option value="">Sélectionnez un type</option>
                            <option value="materiel">📚 Matériel scolaire</option>
                            <option value="frais">🎓 Frais de scolarité</option>
                            <option value="libre">💝 Don libre</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Montant (DT) *</label>
                        <input type="number" id="donationAmount" class="form-input" placeholder="0.00" step="0.01" min="1" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label checkbox-group">
                            <input type="checkbox" id="donationAnonymous">
                            <span>Faire un don anonyme</span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Message (optionnel)</label>
                        <textarea id="donationMessage" class="form-textarea" placeholder="Votre message de soutien..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeDonationModal()">Annuler</button>
                <button class="btn-primary" id="submitDonationBtn">Confirmer le don</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const BACKEND_PORT = '5267';
        const API_BASE_URL = `http://localhost:${BACKEND_PORT}`;
        const DONATION_API_URL = `${API_BASE_URL}/api/Donation`;
        const USERS_API_URL = `${API_BASE_URL}/api/utilisateurs`;

        // État global
        let donations = [];
        let currentUser = null;
        let currentTab = 'all';
        let isLoading = false;
        let usersCache = {};

        // Initialisation
        document.addEventListener('DOMContentLoaded', async function() {
            await loadCurrentUser();
            await loadDonations();
            attachEventListeners();
            
            // Écouter les changements de paramètres globaux
            document.addEventListener('settingsUpdated', function(e) {
                console.log('Paramètres mis à jour:', e.detail);
                // Mettre à jour les couleurs CSS dynamiquement si nécessaire
                const settings = e.detail;
                document.documentElement.style.setProperty('--primary-green', settings.couleurPrimaire);
                document.documentElement.style.setProperty('--accent-orange', settings.couleurSecondaire);
            });
        });

        // Chargement de l'utilisateur connecté
        async function loadCurrentUser() {
            try {
                const userStr = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
                if (userStr) {
                    currentUser = JSON.parse(userStr);
                    console.log('✅ Utilisateur chargé:', currentUser);
                } else {
                    console.log('⚠️ Aucun utilisateur connecté trouvé');
                }
            } catch (e) {
                console.error('❌ Erreur chargement utilisateur:', e);
            }
        }

        // Extraction des données de la réponse API
        function extractDataFromResponse(response) {
            if (!response) return [];
            
            // Si c'est un tableau direct
            if (Array.isArray(response)) {
                return response;
            }
            
            // Format ApiResponse standard (success + data)
            if (response.success === true && response.data) {
                return Array.isArray(response.data) ? response.data : [];
            }
            
            if (response.Success === true && response.Data) {
                return Array.isArray(response.Data) ? response.Data : [];
            }
            
            // Autres formats possibles
            if (response.data && Array.isArray(response.data)) return response.data;
            if (response.Data && Array.isArray(response.Data)) return response.Data;
            if (response.donations && Array.isArray(response.donations)) return response.donations;
            if (response.items && Array.isArray(response.items)) return response.items;
            
            return [];
        }

        // Chargement des donations
        async function loadDonations() {
            if (isLoading) return;
            isLoading = true;
            
            showLoading();
            
            try {
                const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
                const headers = { 'Content-Type': 'application/json' };
                
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }
                
                const response = await fetch(DONATION_API_URL, { headers });
                
                if (!response.ok) {
                    throw new Error(`Erreur ${response.status}: ${response.statusText}`);
                }
                
                const result = await response.json();
                console.log('Réponse API brute:', result);
                
                // Extraire les donations de la réponse
                const extractedDonations = extractDataFromResponse(result);
                donations = Array.isArray(extractedDonations) ? extractedDonations : [];
                
                // Nettoyer et normaliser les données
                donations = donations.map(d => ({
                    ...d,
                    montant: parseFloat(d.montant) || parseFloat(d.Montant) || 0,
                    typeDonation: d.typeDonation || d.TypeDonation || 'libre',
                    anonyme: d.anonyme === true || d.Anonyme === true,
                    message: d.message || d.Message || '',
                    donateurId: d.donateurId || d.DonateurId || null,
                    dateDonation: d.dateDonation || d.DateDonation || d.createdAt || d.CreatedAt || new Date().toISOString()
                }));
                
                console.log(`✅ ${donations.length} donations chargées`);
                
                // Charger les infos des donateurs
                await enrichDonationsWithUsers();
                
                updateStats();
                renderDonations();
                
            } catch (error) {
                console.error('❌ Erreur chargement donations:', error);
                showToast('Erreur de chargement des donations: ' + error.message, 'error');
                donations = [];
                updateStats();
                renderDonations();
            } finally {
                isLoading = false;
            }
        }

        // Enrichissement avec les informations des donateurs
        async function enrichDonationsWithUsers() {
            if (!donations.length) return;
            
            const donorIds = [...new Set(donations
                .filter(d => !d.anonyme && d.donateurId)
                .map(d => d.donateurId))];
            
            for (const donorId of donorIds) {
                if (!usersCache[donorId]) {
                    try {
                        const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
                        const response = await fetch(`${USERS_API_URL}/${donorId}`, {
                            headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                        });
                        
                        if (response.ok) {
                            const result = await response.json();
                            let userData = null;
                            
                            if (result.success === true && result.data) {
                                userData = result.data;
                            } else if (result.Success === true && result.Data) {
                                userData = result.Data;
                            } else if (result && typeof result === 'object') {
                                userData = result;
                            }
                            
                            if (userData) {
                                usersCache[donorId] = {
                                    prenom: userData.prenom || userData.Prenom || 'Utilisateur',
                                    nom: userData.nom || userData.Nom || '',
                                    role: userData.role || userData.Role || userData.type || 'Donateur'
                                };
                            }
                        }
                    } catch (e) {
                        console.warn(`Impossible de charger l'utilisateur ${donorId}`);
                    }
                }
            }
            
            // Associer les donateurs
            donations.forEach(donation => {
                if (!donation.anonyme && donation.donateurId && usersCache[donation.donateurId]) {
                    donation.donateur = usersCache[donation.donateurId];
                }
            });
        }

        // Mise à jour des statistiques
        function updateStats() {
            const totalAmount = donations.reduce((sum, d) => sum + (parseFloat(d.montant) || 0), 0);
            const totalDonations = donations.length;
            const uniqueDonors = new Set(donations.filter(d => !d.anonyme && d.donateurId).map(d => d.donateurId)).size;
            const avgAmount = totalDonations > 0 ? totalAmount / totalDonations : 0;
            
            document.getElementById('totalAmount').textContent = formatCurrency(totalAmount);
            document.getElementById('totalDonors').textContent = uniqueDonors;
            document.getElementById('totalDonations').textContent = totalDonations;
            document.getElementById('avgAmount').textContent = formatCurrency(avgAmount);
        }

        // Rendu des donations
        function renderDonations() {
            const container = document.getElementById('donationsList');
            let filteredDonations = donations;
            
            if (currentTab !== 'all') {
                filteredDonations = donations.filter(d => d.typeDonation === currentTab);
            }
            
            if (!filteredDonations || filteredDonations.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎁</div>
                        <h3>Aucune donation</h3>
                        <p>Soyez le premier à faire un don !</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filteredDonations.map(donation => renderDonationCard(donation)).join('');
        }

        // Rendu d'une carte de donation
        function renderDonationCard(donation) {
            const isAnonymous = donation.anonyme === true;
            const donor = donation.donateur || {};
            
            let donorName = 'Donateur anonyme';
            let donorRole = 'Donateur';
            let donorInitials = '??';
            
            if (!isAnonymous) {
                const prenom = donor.prenom || '';
                const nom = donor.nom || '';
                donorName = (prenom + ' ' + nom).trim() || 'Utilisateur';
                donorRole = donor.role || 'Donateur';
                donorInitials = ((prenom.charAt(0) || '') + (nom.charAt(0) || '')).toUpperCase() || '??';
            }
            
            const typeLabels = {
                'materiel': { label: 'Matériel scolaire', class: 'type-materiel', icon: '📚' },
                'frais': { label: 'Frais scolaires', class: 'type-frais', icon: '🎓' },
                'libre': { label: 'Don libre', class: 'type-libre', icon: '💝' }
            };
            const typeInfo = typeLabels[donation.typeDonation] || { label: donation.typeDonation || 'Don', class: 'type-libre', icon: '🎁' };
            
            const date = new Date(donation.dateDonation);
            const formattedDate = date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
            
            return `
                <div class="donation-card">
                    <div class="donation-amount">
                        ${formatCurrency(parseFloat(donation.montant) || 0)}
                        <small>DT</small>
                    </div>
                    <span class="donation-type ${typeInfo.class}">
                        ${typeInfo.icon} ${typeInfo.label}
                    </span>
                    <div class="donation-donor">
                        <div class="donor-avatar">${escapeHtml(donorInitials)}</div>
                        <div class="donor-info">
                            <div class="donor-name">${escapeHtml(donorName)}</div>
                            <div class="donor-role">${escapeHtml(donorRole)}</div>
                        </div>
                        ${isAnonymous ? '<span class="anonymous-badge">🔒 Anonyme</span>' : ''}
                    </div>
                    ${donation.message ? `
                        <div class="donation-message">
                            "${escapeHtml(donation.message)}"
                        </div>
                    ` : ''}
                    <div class="donation-date">
                        📅 ${formattedDate}
                    </div>
                </div>
            `;
        }

        // Formatage de la monnaie
        function formatCurrency(amount) {
            return new Intl.NumberFormat('fr-TN', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            }).format(amount);
        }

        // Échappement HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Création d'une donation
        async function createDonation(donationData) {
            const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
            
            if (!token) {
                throw new Error('Vous devez être connecté pour faire un don');
            }
            
            const response = await fetch(DONATION_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(donationData)
            });
            
            if (!response.ok) {
                let errorMessage = `Erreur ${response.status}`;
                try {
                    const error = await response.json();
                    if (error.message) errorMessage = error.message;
                    else if (error.Message) errorMessage = error.Message;
                    else if (error.errors) errorMessage = JSON.stringify(error.errors);
                } catch (e) {}
                throw new Error(errorMessage);
            }
            
            const result = await response.json();
            const newDonation = extractDataFromResponse(result);
            return Array.isArray(newDonation) ? newDonation[0] : newDonation;
        }

        // Attachement des écouteurs d'événements
        function attachEventListeners() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentTab = tab.dataset.tab;
                    renderDonations();
                });
            });
            
            document.getElementById('makeDonationBtn').addEventListener('click', openDonationModal);
            document.getElementById('refreshBtn').addEventListener('click', () => {
                loadDonations();
                showToast('Donations actualisées', 'success');
            });
            document.getElementById('submitDonationBtn').addEventListener('click', handleSubmitDonation);
        }

        // Ouverture du modal
        function openDonationModal() {
            if (!currentUser) {
                showToast('Veuillez vous connecter pour faire un don', 'error');
                return;
            }
            
            document.getElementById('donationForm').reset();
            document.getElementById('donationModal').style.display = 'flex';
        }

        // Fermeture du modal
        function closeDonationModal() {
            document.getElementById('donationModal').style.display = 'none';
        }

        // Soumission du don
        async function handleSubmitDonation() {
            const type = document.getElementById('donationType').value;
            const montant = parseFloat(document.getElementById('donationAmount').value);
            const anonyme = document.getElementById('donationAnonymous').checked;
            const message = document.getElementById('donationMessage').value;
            
            if (!type) {
                showToast('Veuillez sélectionner un type de donation', 'error');
                return;
            }
            
            if (!montant || montant <= 0) {
                showToast('Veuillez entrer un montant valide', 'error');
                return;
            }
            
            const button = document.getElementById('submitDonationBtn');
            button.disabled = true;
            button.textContent = 'Envoi en cours...';
            
            try {
                const donationData = {
                    montant: montant,
                    typeDonation: type,
                    donateurId: currentUser.id || currentUser._id,
                    anonyme: anonyme,
                    message: message || null
                };
                
                const newDonation = await createDonation(donationData);
                
                if (newDonation) {
                    // Normaliser la nouvelle donation
                    const normalizedDonation = {
                        ...newDonation,
                        montant: parseFloat(newDonation.montant) || parseFloat(newDonation.Montant) || montant,
                        typeDonation: newDonation.typeDonation || newDonation.TypeDonation || type,
                        anonyme: anonyme,
                        message: message || '',
                        donateurId: currentUser.id || currentUser._id,
                        donateur: anonyme ? null : {
                            prenom: currentUser.prenom,
                            nom: currentUser.nom,
                            role: currentUser.role
                        }
                    };
                    donations.unshift(normalizedDonation);
                }
                
                updateStats();
                renderDonations();
                closeDonationModal();
                showToast('Merci pour votre générosité ! Votre don a été enregistré.', 'success');
                
            } catch (error) {
                console.error('❌ Erreur:', error);
                showToast(error.message || 'Erreur lors de l\'enregistrement du don', 'error');
            } finally {
                button.disabled = false;
                button.textContent = 'Confirmer le don';
            }
        }

        // Affichage du chargement
        function showLoading() {
            const container = document.getElementById('donationsList');
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 1rem; color: var(--text-light);">Chargement des donations...</p>
                </div>
            `;
        }

        // Affichage des notifications
        function showToast(message, type = 'info') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span>
                <span>${escapeHtml(message)}</span>
            `;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Fermeture du modal en cliquant à l'extérieur
        document.addEventListener('click', function(e) {
            const modal = document.getElementById('donationModal');
            if (e.target === modal) {
                closeDonationModal();
            }
        });
        
        // Export pour débogage
        window.DonationsModule = {
            loadDonations,
            refresh: loadDonations,
            getTotalAmount: () => donations.reduce((sum, d) => sum + (parseFloat(d.montant) || 0), 0),
            getDonationsCount: () => donations.length
        };
    </script>
</body>
</html>

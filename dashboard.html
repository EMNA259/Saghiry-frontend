<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGHIRY - Tableau de bord Administrateur</title>
    <!-- Importation de Chart.js pour les graphiques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Importation de Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== VARIABLES CSS (COULEURS ET OMBRES) ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-green: #4ca896;      /* Couleur principale verte */
            --primary-dark: #3d8a7f;       /* Vert plus foncé */
            --primary-deep: #2d6b63;       /* Vert profond */
            --accent-orange: #ff9466;      /* Couleur d'accent orange */
            --accent-orange-dark: #ff7b3d; /* Orange foncé */
            --blue-light: #339af0;         /* Bleu clair */
            --gray-bg: #f8fafc;            /* Fond gris clair */
            --gray-border: #e0e9e7;        /* Couleur des bordures */
            --text-dark: #1e3b36;          /* Texte foncé */
            --text-soft: #3d5a54;          /* Texte doux */
            --text-light: #5a9d91;         /* Texte clair */
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);   /* Petite ombre */
            --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.08);   /* Ombre moyenne */
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.12);  /* Grande ombre */
        }

        /* ========== STYLES DE BASE ========== */
        body {
            background: var(--gray-bg);
            min-height: 100vh;
            padding: 1.5rem;
        }

        .dashboard-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* ========== EN-TÊTE ========== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            color: var(--text-dark);
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .page-title::before {
            content: '📊';
            font-size: 1.8rem;
        }

        .page-subtitle {
            color: var(--text-light);
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        /* Bouton d'actualisation */
        .btn-refresh {
            background: white;
            color: var(--primary-green);
            border: 1px solid var(--primary-green);
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-refresh:hover {
            background: var(--primary-green);
            color: white;
            transform: translateY(-2px);
        }

        /* Badge de date */
        .date-badge {
            background: linear-gradient(135deg, var(--primary-green), var(--primary-dark));
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
        }

        /* ========== GRILLE DES STATISTIQUES ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        /* Carte de statistique */
        .stat-card {
            background: rgb(255, 255, 255);
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-green);
        }

        /* Bandeau dégradé en haut de chaque carte */
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-green), var(--accent-orange));
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-light);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .stat-value {
            color: var(--text-dark);
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat-change {
            font-size: 0.7rem;
            margin-top: 0.5rem;
            color: var(--text-light);
        }

        /* ========== GRILLE PRINCIPALE ========== */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        /* Responsive : sur mobile, une seule colonne */
        @media (max-width: 1100px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Cartes génériques afficher en bas*/
        .card {
            background: rgb(255, 255, 255);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-border);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--gray-border);
        }

        .card-header h3 {
            font-size: 1.1rem;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-header a {
            color: var(--primary-green);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
        }

        /* Conteneur pour les graphiques Chart.js */
        .chart-container {
            position: relative;
            height: 260px;
            margin-bottom: 0.5rem;
        }

        canvas {
            max-height: 260px;
            width: 100%;
        }

        /* ========== LISTES DÉFILANTES ========== */
        .classe-list, .personnel-list, .absence-list, .conge-list, .donation-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-height: 360px;
            overflow-y: auto;
        }

        /* Élément de classe */
        .classe-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            background: var(--gray-bg);
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .classe-item:hover {
            background: #e0f2f1;
            transform: translateX(5px);
        }

        .classe-info {
            flex: 1;
        }

        .classe-nom {
            font-weight: 700;
            color: var(--text-dark);
            font-size: 1rem;
        }

        .classe-niveau {
            font-size: 0.7rem;
            color: var(--text-light);
            margin-top: 0.2rem;
        }

        .classe-effectif {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .effectif-nombre {
            font-weight: 800;
            color: var(--primary-green);
            font-size: 1.3rem;
        }

        .effectif-label {
            font-size: 0.65rem;
            color: var(--text-light);
        }

        /* Élément de don */
        .donation-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            background: var(--gray-bg);
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .donation-item:hover {
            background: linear-gradient(135deg, #fef3e8, #fff5e8);
            transform: translateX(5px);
        }

        /* Badges pour les différents types de dons */
        .donation-badge.materiel {
            background: #e3f2fd;
            color: #1565c0;
        }

        .donation-badge.financiere {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .donation-badge.alimentaire {
            background: #fff3e0;
            color: #e65100;
        }

        /* Éléments d'absence et congé */
        .absence-item, .conge-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            background: var(--gray-bg);
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .absence-item:hover {
            background: #ffebee;
            transform: translateX(5px);
        }

        .conge-item:hover {
            background: #e0f2f1;
            transform: translateX(5px);
        }

        /* Badges de statut pour les absences */
        .absence-badge.absence {
            background: #ffebee;
            color: #c62828;
        }

        .absence-badge.retard {
            background: #fff8e1;
            color: #f57c00;
        }

        .absence-badge.presence {
            background: #e8f5e9;
            color: #2e7d32;
        }

        /* Badges de statut pour les congés */
        .conge-badge.approuve {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .conge-badge.en_attente {
            background: #fff8e1;
            color: #f57c00;
        }

        .conge-badge.refuse {
            background: #ffebee;
            color: #c62828;
        }

        .conge-badge.maladie {
            background: #e3f2fd;
            color: #1565c0;
        }

        .conge-badge.conge_annuel {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .conge-badge.personnel {
            background: #fff3e0;
            color: #e65100;
        }

        /* Élément personnel (enseignant/vacataire) */
        .personnel-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem;
            background: var(--gray-bg);
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .personnel-item:hover {
            background: #e0f2f1;
            transform: translateX(5px);
        }

        .badge-enseignant {
            background: #e3f2fd;
            color: #1565c0;
        }

        .badge-permanent {
            background: #fff3e0;
            color: #e65100;
        }

        /* État vide (pas de données) */
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
        }

        /* ========== ANIMATION DE CHARGEMENT ========== */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--gray-border);
            border-top-color: var(--primary-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== NOTIFICATIONS ========== */
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 2rem;
            border-radius: 12px;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            font-weight: 600;
        }

        .alert-success {
            background: var(--primary-green);
            color: white;
        }

        .alert-error {
            background: #ef4444;
            color: white;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ========== MODALES ========== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            transform: translateY(30px);
            transition: all 0.3s ease;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--gray-border);
        }

        .modal-close {
            background: var(--gray-bg);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--text-light);
        }

        /* Filtres pour les congés */
        .status-filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            background: var(--gray-bg);
            color: var(--text-light);
            transition: all 0.2s;
        }

        .filter-chip.active {
            background: var(--primary-green);
            color: white;
        }

        /* Scrollbar personnalisée */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-green);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container" id="dashboardContainer">
        <div class="loading">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- ========== MODALES ========== -->
    <!-- Modal pour afficher les détails d'une classe (liste des élèves) -->
    <div class="modal" id="classeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Élèves de la classe</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- Modal pour afficher les détails d'une absence -->
    <div class="modal" id="absenceModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="absenceModalTitle">Détails de l'absence</h2>
                <button class="modal-close" onclick="closeAbsenceModal()">&times;</button>
            </div>
            <div id="absenceModalContent"></div>
        </div>
    </div>

    <!-- Modal pour afficher les détails d'un congé -->
    <div class="modal" id="congeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="congeModalTitle">Détails du congé</h2>
                <button class="modal-close" onclick="closeCongeModal()">&times;</button>
            </div>
            <div id="congeModalContent"></div>
        </div>
    </div>

    <!-- Modal pour afficher les détails d'un don -->
    <div class="modal" id="donationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="donationModalTitle">Détails du don</h2>
                <button class="modal-close" onclick="closeDonationModal()">&times;</button>
            </div>
            <div id="donationModalContent"></div>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const API_BASE = 'http://localhost:5267';  // URL de base de l'API
        let token = null;                          // Token d'authentification JWT
        
        // ========== ORDRE DES NIVEAUX POUR LE TRI ==========
        const niveauOrder = [
            '1ère année', '1ere année', '1ere annee', '1ère annee',
            '2ème année', '2eme année', '2eme annee', '2ème annee',
            '3ème année', '3eme année', '3eme annee', '3ème annee',
            '4ème année', '4eme année', '4eme annee', '4ème annee',
            '5ème année', '5eme année', '5eme annee', '5ème annee',
            '6ème année', '6eme année', '6eme annee', '6ème annee'
        ];
        
        /**
         * Fonction pour déterminer le rang d'un niveau scolaire
         * @param {string} niveau - Le niveau à évaluer (ex: "1ère année")
         * @returns {number} - Position dans l'ordre (0-5 pour 1ère à 6ème)
         */
        function getNiveauRank(niveau) {
            if (!niveau) return 999;
            const lowerNiveau = niveau.toLowerCase().trim();
            for (let i = 0; i < niveauOrder.length; i++) {
                if (lowerNiveau === niveauOrder[i].toLowerCase()) {
                    return i;
                }
            }
            const match = lowerNiveau.match(/(\d+)/);
            if (match) {
                const num = parseInt(match[1]);
                if (num >= 1 && num <= 6) return num - 1;
            }
            return 999;
        }

        /**
         * Trie les classes par niveau scolaire
         * @param {Array} classes - Liste des classes
         * @returns {Array} - Classes triées
         */
        function sortClassesByNiveau(classes) {
            return [...classes].sort((a, b) => {
                const niveauA = a.niveau || a.Niveau || '';
                const niveauB = b.niveau || b.Niveau || '';
                const rankA = getNiveauRank(niveauA);
                const rankB = getNiveauRank(niveauB);
                if (rankA !== rankB) return rankA - rankB;
                const nomA = a.nomClasse || a.NomClasse || '';
                const nomB = b.nomClasse || b.NomClasse || '';
                return nomA.localeCompare(nomB);
            });
        }

        /**
         * Regroupe les classes par niveau
         * @param {Array} classes - Liste des classes
         * @returns {Object} - Objet avec les niveaux comme clés
         */
        function groupClassesByNiveau(classes) {
            const groups = {};
            classes.forEach(classe => {
                const niveau = classe.niveau || classe.Niveau || 'Non défini';
                if (!groups[niveau]) {
                    groups[niveau] = [];
                }
                groups[niveau].push(classe);
            });
            return groups;
        }

        /**
         * Extrait l'ID d'un objet MongoDB ou d'un objet standard
         * @param {Object|string} obj - L'objet contenant l'ID
         * @returns {string|null} - L'ID extrait
         */
        function extractIdFromObject(obj) {
            if (!obj) return null;
            
            if (typeof obj === 'string') {
                return obj.replace(/^["']|["']$/g, '');
            }
            
            if (obj.$oid) {
                return obj.$oid;
            }
            
            if (obj._id) {
                return extractIdFromObject(obj._id);
            }
            
            if (obj.Id) {
                return obj.Id;
            }
            
            if (obj.id) {
                return obj.id;
            }
            
            return null;
        }

        /**
         * Formate une date en format court (jj mois aaaa)
         * @param {Date|string} dateValue - La date à formater
         * @returns {string} - Date formatée
         */
        function formatDate(dateValue) {
            if (!dateValue) return 'Date inconnue';
            try {
                let dateStr = dateValue;
                if (typeof dateValue === 'object' && dateValue.$date) dateStr = dateValue.$date;
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return 'Date inconnue';
                return date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
            } catch(e) {
                return 'Date inconnue';
            }
        }

        /**
         * Formate une date en format long (jour jj mois aaaa)
         * @param {Date|string} dateValue - La date à formater
         * @returns {string} - Date formatée longuement
         */
        function formatDateLong(dateValue) {
            if (!dateValue) return 'Date inconnue';
            try {
                let dateStr = dateValue;
                if (typeof dateValue === 'object' && dateValue.$date) dateStr = dateValue.$date;
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return 'Date inconnue';
                return date.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            } catch(e) {
                return 'Date inconnue';
            }
        }

        // ========== VARIABLES GLOBALES DE DONNÉES ==========
        let stats = {
            totalEleves: 0,
            totalEnseignants: 0,
            totalPermanents: 0,
            totalClasses: 0,
            totalAbsences: 0,
            totalPresences: 0,
            totalRetards: 0
        };
        
        let donationsStats = {
            totalMontant: 0,
            totalDonations: 0,
            parType: {}
        };
        
        // Tableaux de données brutes
        let classesData = [];      // Liste des classes
        let enseignantsData = [];  // Liste des enseignants
        let permanentsData = [];   // Liste des vacataires
        let elevesData = [];       // Liste des élèves
        let absencesData = [];     // Liste des absences/retards/présences
        let congesData = [];       // Liste des demandes de congé
        let donationsData = [];    // Liste des dons
        
        // Maps pour un accès rapide par ID
        let elevesMap = new Map();        // ID élève -> infos élève
        let enseignantsMap = new Map();   // ID enseignant -> nom
        
        // Références des graphiques Chart.js
        let chartClasses = null;
        let chartPersonnel = null;
        let chartAbsences = null;
        let chartDonations = null;
        
        let congesFilter = 'all';  // Filtre actif pour les congés ('all', 'en_attente', 'approuve', 'refuse')

        /**
         * Récupère le token d'authentification stocké
         * @returns {string|null} - Le token ou null
         */
        function getAuthToken() {
            try {
                return localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
            } catch(e) {
                return null;
            }
        }

        /**
         * Affiche une notification temporaire
         * @param {string} message - Le message à afficher
         * @param {string} type - 'success' ou 'error'
         */
        function showMessage(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = message;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }

        /**
         * Charge toutes les données nécessaires au dashboard
         * Fonction principale d'initialisation
         */
        async function chargerToutesDonnees() {
            token = getAuthToken();
            if (!token) {
                showMessage('Session expirée, veuillez vous reconnecter', 'error');

                        <h3 style="margin: 1rem 0;">Session expirée</h3>
                        <p>Veuillez vous reconnecter pour accéder au tableau de bord.</p>
                    </div>
                `;
                return;
            }

            // Chargement séquentiel : d'abord les élèves (pour la map)
            await chargerTousEleves();
            
            // Puis chargement parallèle du reste des données
            await Promise.all([
                chargerStats(),
                chargerClasses(),
                chargerEnseignants(),
                chargerPermanents(),
                chargerAbsences(),
                chargerConges(),
                chargerDonations()
            ]);
            
            // Affichage final du dashboard
            afficherDashboard();
        }

        /**
         * Charge la liste des dons
         */
        async function chargerDonations() {
            try {
                const response = await fetch(`${API_BASE}/api/Donation`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    let data = await response.json();
                    
                    // Extraction des données selon le format de réponse
                    let donations = [];
                    if (data.Success && data.Data) {
                        donations = data.Data;
                    } else if (data.success && data.data) {
                        donations = data.data;
                    } else if (Array.isArray(data)) {
                        donations = data;
                    } else if (data.$values) {
                        donations = data.$values;
                    } else {
                        donations = [];
                    }
                    
                    donationsData = donations;
                    
                    // Calcul des statistiques des dons
                    donationsStats.totalDonations = donationsData.length;
                    donationsStats.totalMontant = 0;
                    donationsStats.parType = {
                        'Financière': 0,
                        'Matériel': 0,
                        'Alimentaire': 0
                    };
                    
                    // Traitement de chaque don
                    for (let d of donationsData) {
                        const montant = d.montant || d.Montant || 0;
                        donationsStats.totalMontant += montant;
                        
                        // Détermination du type de don
                        const type = (d.type || d.Type || 'financière').toLowerCase();
                        if (type.includes('matériel') || type.includes('materiel')) {
                            donationsStats.parType['Matériel'] += montant;
                        } else if (type.includes('alimentaire')) {
                            donationsStats.parType['Alimentaire'] += montant;
                        } else {
                            donationsStats.parType['Financière'] += montant;
                        }
                        
                        // Formatage des données pour l'affichage
                        d.typeAffichage = type.includes('matériel') ? 'Matériel' : (type.includes('alimentaire') ? 'Alimentaire' : 'Financière');
                        d.montantAffichage = montant;
                        d.donateurNom = d.donateurNom || d.DonateurNom || (d.estAnonyme ? 'Anonyme' : 'Donateur');
                        d.estAnonymeAffichage = d.estAnonyme || d.EstAnonyme || false;
                        d.dateAffichage = d.date || d.Date;
                        if (d.dateAffichage && d.dateAffichage.$date) d.dateAffichage = d.dateAffichage.$date;
                        d.messageAffichage = d.message || d.Message || '';
                    }
                    
                    // Tri par date décroissante (les plus récents d'abord)
                    donationsData.sort((a, b) => {
                        const dateA = a.dateAffichage ? new Date(a.dateAffichage) : 0;
                        const dateB = b.dateAffichage ? new Date(b.dateAffichage) : 0;
                        return dateB - dateA;
                    });
                    
                    console.log(`✅ ${donationsData.length} donations chargées, total: ${donationsStats.totalMontant} DT`);
                } else {
                    console.error('Erreur chargement donations:', response.status);
                    donationsData = [];
                }
            } catch (error) {
                console.error('Erreur chargement donations:', error);
                donationsData = [];
            }
        }

        /**
         * Charge les enregistrements d'absences/retards/présences
         */
        async function chargerAbsences() {
            try {
                const response = await fetch(`${API_BASE}/api/Absence`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    let data = await response.json();
                    
                    let absences = [];
                    if (data.Success && data.Data) {
                        absences = data.Data;
                    } else if (data.success && data.data) {
                        absences = data.data;
                    } else if (Array.isArray(data)) {
                        absences = data;
                    } else if (data.$values) {
                        absences = data.$values;
                    } else {
                        absences = [];
                    }
                    
                    absencesData = absences;
                    
                    // Réinitialisation des compteurs
                    stats.totalAbsences = 0;
                    stats.totalPresences = 0;
                    stats.totalRetards = 0;
                    
                    // Traitement de chaque enregistrement
                    for (let absence of absencesData) {
                        // Extraction de l'ID de l'élève
                        let eleveId = null;
                        if (absence.eleve) {
                            eleveId = extractIdFromObject(absence.eleve);
                        } else if (absence.EleveId) {
                            eleveId = extractIdFromObject(absence.EleveId);
                        } else if (absence.eleveId) {
                            eleveId = extractIdFromObject(absence.eleveId);
                        }
                        
                        // Extraction de l'ID de l'enseignant
                        const enseignantId = extractIdFromObject(absence.enseignant || absence.EnseignantId || absence.enseignantId);
                        
                        // Récupération des infos de l'élève depuis la Map
                        let eleveInfo = null;
                        if (eleveId) {
                            eleveInfo = elevesMap.get(eleveId);
                            if (!eleveInfo && typeof eleveId === 'string') {
                                eleveInfo = elevesMap.get(eleveId.trim());
                            }
                        }
                        
                        // Détermination du type (absence/retard/présence)
                        let type = (absence.type || absence.Type || 'absence').toLowerCase();
                        if (type === 'absence') type = 'absence';
                        else if (type === 'retard') type = 'retard';
                        else if (type === 'presence' || type === 'present') type = 'presence';
                        
                        // Formatage de la date
                        let absenceDate = absence.date || absence.Date;
                        if (absenceDate && absenceDate.$date) absenceDate = absenceDate.$date;
                        
                        // Enrichissement de l'objet absence avec les données formatées
                        absence.eleveIdExtracted = eleveId;
                        absence.enseignantIdExtracted = enseignantId;
                        absence.eleveNom = eleveInfo ? eleveInfo.nom : (absence.eleveNom || 'Chargement...');
                        absence.typeAffichage = type;
                        absence.motifAffichage = absence.motif || absence.Motif || '-';
                        absence.dateAffichage = absenceDate;
                        absence.enseignantNom = enseignantsMap.get(enseignantId) || (absence.enseignantNom || 'Enseignant');
                        absence.dureeAffichage = absence.duree || absence.Duree || 1;
                        
                        // Incrémentation des compteurs
                        if (type === 'absence') stats.totalAbsences++;
                        else if (type === 'retard') stats.totalRetards++;
                        else if (type === 'presence') stats.totalPresences++;
                    }
                    
                    // Tri par date décroissante
                    absencesData.sort((a, b) => {
                        const dateA = a.dateAffichage ? new Date(a.dateAffichage) : 0;
                        const dateB = b.dateAffichage ? new Date(b.dateAffichage) : 0;
                        return dateB - dateA;
                    });
                    
                    console.log(`✅ ${absencesData.length} enregistrements chargés`);
                }
            } catch (error) {
                console.error('Erreur chargement absences:', error);
                absencesData = [];
            }
        }

        /**
         * Charge les demandes de congé des enseignants
         */
        async function chargerConges() {
            try {
                const response = await fetch(`${API_BASE}/api/Conge/toutes`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    let data = await response.json();
                    
                    let conges = [];
                    if (data.Success && data.Data) {
                        conges = data.Data;
                    } else if (data.success && data.data) {
                        conges = data.data;
                    } else if (Array.isArray(data)) {
                        conges = data;
                    } else if (data.$values) {
                        conges = data.$values;
                    } else {
                        conges = [];
                    }
                    
                    congesData = conges;
                    
                    // Traitement de chaque congé
                    for (let conge of congesData) {
                        const enseignantId = extractIdFromObject(conge.enseignantId || conge.EnseignantId);
                        let enseignantInfo = enseignantsMap.get(enseignantId);
                        
                        // Si l'enseignant n'est pas dans la Map, on tente de le charger individuellement
                        if (!enseignantInfo && enseignantId) {
                            try {
                                const userRes = await fetch(`${API_BASE}/api/utilisateurs/${enseignantId}`, {
                                    headers: { 'Authorization': `Bearer ${token}` }
                                });
                                if (userRes.ok) {
                                    const userData = await userRes.json();
                                    const prenom = userData.prenom || userData.Prenom || '';
                                    const nom = userData.nom || userData.Nom || '';
                                    enseignantInfo = `${prenom} ${nom}`.trim();
                                    if (enseignantInfo) {
                                        enseignantsMap.set(enseignantId, enseignantInfo);
                                    }
                                }
                            } catch(e) {
                                console.warn(`Impossible de charger l'enseignant ${enseignantId}`);
                            }
                        }
                        
                        // Formatage des dates
                        let dateDebut = conge.dateDebut || conge.DateDebut;
                        let dateFin = conge.dateFin || conge.DateFin;
                        if (dateDebut && dateDebut.$date) dateDebut = dateDebut.$date;
                        if (dateFin && dateFin.$date) dateFin = dateFin.$date;
                        
                        // Normalisation du statut (gestion des accents)
                        let statutRaw = (conge.statut || conge.Statut || 'en_attente').toLowerCase();
                        statutRaw = statutRaw.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        
                        let statutNormalise = 'en_attente';
                        if (statutRaw === 'approuve' || statutRaw === 'approve' || statutRaw === 'approuver') {
                            statutNormalise = 'approuve';
                        } else if (statutRaw === 'refuse' || statutRaw === 'refused' || statutRaw === 'refuser') {
                            statutNormalise = 'refuse';
                        }
                        
                        // Enrichissement de l'objet congé
                        conge.enseignantIdExtracted = enseignantId;
                        conge.enseignantNom = enseignantInfo || (conge.enseignantNom || 'Chargement...');
                        conge.typeAffichage = conge.type || conge.Type || 'congé';
                        conge.statutAffichage = statutNormalise;
                        conge.motifAffichage = conge.motif || conge.Motif || '-';
                        conge.dateDebutAffichage = dateDebut;
                        conge.dateFinAffichage = dateFin;
                        conge.dateApprobationAffichage = conge.dateApprobation || conge.DateApprobation;
                        if (conge.dateApprobationAffichage && conge.dateApprobationAffichage.$date) {
                            conge.dateApprobationAffichage = conge.dateApprobationAffichage.$date;
                        }
                    }
                    
                    // Tri par date de début décroissante
                    congesData.sort((a, b) => {
                        const dateA = a.dateDebutAffichage ? new Date(a.dateDebutAffichage) : 0;
                        const dateB = b.dateDebutAffichage ? new Date(b.dateDebutAffichage) : 0;
                        return dateB - dateA;
                    });
                    
                    console.log(`✅ ${congesData.length} congés chargés`);
                }
            } catch (error) {
                console.error('Erreur chargement congés:', error);
                congesData = [];
            }
        }

        /**
         * Échappe les caractères HTML pour éviter les injections XSS
         * @param {string} str - La chaîne à échapper
         * @returns {string} - Chaîne échappée
         */
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        /**
         * Crée le graphique à barres des effectifs par classe
         */
        function creerGraphiqueClasses() {
            const ctx = document.getElementById('chartClasses');
            if (!ctx) return;
            if (chartClasses) chartClasses.destroy();
            
            if (classesData.length === 0) return;
            
            const classesTriees = sortClassesByNiveau(classesData);
            const topClasses = classesTriees.slice(0, 8);  // Top 8 classes
            
            const effectifs = topClasses.map(c => c.effectifReel || c.effectif || c.Effectif || 0);
            const noms = topClasses.map(c => {
                const nom = c.nomClasse || c.NomClasse || 'Classe';
                const niveau = c.niveau || c.Niveau || '';
                return niveau ? `${nom} (${niveau})` : nom;
            });
            const colors = ['#4ca896', '#ff9466', '#339af0', '#f59e0b', '#10b981', '#8b5cf6', '#ef4444', '#ec489a'];
            
            chartClasses = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: noms,
                    datasets: [{
                        label: "Nombre d'élèves",
                        data: effectifs,
                        backgroundColor: colors.slice(0, effectifs.length),
                        borderRadius: 10,
                        barPercentage: 0.7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'top', labels: { font: { size: 11 } } },
                        tooltip: { callbacks: { label: (ctx) => `${ctx.raw} élèves` } }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#e0e9e7' }, title: { display: true, text: 'Effectif' }, ticks: { stepSize: 1 } },
                        x: { ticks: { font: { size: 10 }, maxRotation: 45, minRotation: 45 } }
                    }
                }
            });
        }

                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-calendar-times"></i> Derniers enregistrements (Absences/Retards/Présences)</h3>
                    </div>
                    <div class="chart-container" style="height: 200px;">
                        <canvas id="chartAbsences"></canvas>
                    </div>
                    ${dernieresAbsences.length > 0 ? `
                        <div class="absence-list" style="margin-top: 1rem;">
                            ${dernieresAbsences.map(a => {
                                let typeClass = 'absence';
                                let typeLabel = '❌ Absence';
                                if (a.typeAffichage === 'retard') {
                                    typeClass = 'retard';
                                    typeLabel = '⏰ Retard';
                                } else if (a.typeAffichage === 'presence') {
                                    typeClass = 'presence';
                                    typeLabel = '✅ Présence';
                                }
                                return `
                                    <div class="absence-item" onclick='showAbsenceDetails(${JSON.stringify(a).replace(/'/g, "\\'")})'>
                                        <div class="absence-info">
                                            <div class="absence-eleve">${escapeHtml(a.eleveNom)}</div>
                                            <div class="absence-detail">${escapeHtml(a.motifAffichage ? (a.motifAffichage.length > 40 ? a.motifAffichage.substring(0, 40) + '...' : a.motifAffichage) : '-')}</div>
                                        </div>
                                        <div style="text-align: right;">
                                            <span class="absence-badge ${typeClass}">${typeLabel}</span>
                                            <div class="absence-date">${formatDate(a.dateAffichage)}</div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        <div style="margin-top: 0.8rem; padding: 0.5rem; background: var(--gray-bg); border-radius: 10px; text-align: center; font-size: 0.8rem;">
                            <strong>📋 Total des enregistrements: ${absencesData.length}</strong>
                        </div>
                    ` : '<div class="empty-state"><i class="fas fa-check-circle"></i><p>Aucun enregistrement</p></div>'}
                </div>
            `;
            
            // Création des graphiques après l'insertion du HTML
            setTimeout(() => {
                creerGraphiqueClasses();
                creerGraphiquePersonnel();
                creerGraphiqueAbsences();
                creerGraphiqueDonations();
            }, 100);
        }

        /**
         * Rafraîchit toutes les données et réaffiche le dashboard
         */
        async function rafraichirTout() {
            showMessage('Actualisation des données...', 'success');
            await chargerToutesDonnees();
            showMessage('Données actualisées avec succès', 'success');
        }

        /**
         * Initialisation au chargement de la page
         */
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📊 Dashboard administrateur initialisé');
            chargerToutesDonnees();
        });
    </script>
</body>
</html>
